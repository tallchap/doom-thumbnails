services:
  - type: web
    name: doom-thumbnails
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python thumbnail_gen.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: NO_BROWSER
        value: "1"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: "us-east-1"

  - type: web
    name: doom-format
    runtime: node
    rootDir: format-app
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false

